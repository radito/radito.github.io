name: Build Hugo Page

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - README.md
      - LICENSE
      - .gitignore
  pull_request:
    paths-ignore:
      - README.md
      - LICENSE
      - .gitignore

concurrency:
  group: hugo-v2-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-22.04

    permissions:
      contents: write
      pull-requests: write
      issues: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          # IMPORTANT:
          # Remove fetch-depth: 0 unless you really need Git history.
          # Default is faster because it fetches only one commit.
          fetch-depth: 1

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.119.0"
          extended: true

      - name: Setup Node
        if: github.ref == 'refs/heads/main'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache Hugo
        uses: actions/cache@v4
        with:
          path: |
            resources/_gen
            ~/.cache/hugo_cache
          key: ${{ runner.os }}-hugo-${{ hashFiles('**/go.sum', '**/config.*', '**/hugo.*', 'themes/**', 'assets/**') }}
          restore-keys: |
            ${{ runner.os }}-hugo-

      - name: Build PR
        if: github.ref != 'refs/heads/main'
        run: hugo

      - name: Validate telemetry key
        if: github.ref == 'refs/heads/main'
        env:
          HUGO_PARAMS_TELEMETRYHMACKEY: ${{ secrets.TELEMETRY_HMAC_KEY }}
        run: test -n "$HUGO_PARAMS_TELEMETRYHMACKEY"

      - name: Build Production
        if: github.ref == 'refs/heads/main'
        env:
          HUGO_PARAMS_TELEMETRYHMACKEY: ${{ secrets.TELEMETRY_HMAC_KEY }}
        run: hugo --gc --minify

      - name: Install obfuscator
        if: github.ref == 'refs/heads/main'
        run: npm ci --no-audit --no-fund

      - name: Obfuscate portfolio telemetry
        if: github.ref == 'refs/heads/main'
        run: npm run obfuscate:portfolio

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
